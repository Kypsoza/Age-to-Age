<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  // Détection mobile : écran tactile étroit → redirige vers la version mobile dédiée.
  // ?desktop=1 dans l'URL permet de forcer la version PC pour tester/déboguer.
  (function(){
    var forceDesktop = /[?&]desktop=1/.test(window.location.search);
    var isMobile = !forceDesktop
      && window.matchMedia("(pointer: coarse)").matches
      && Math.min(window.innerWidth, window.innerHeight) < 820;
    if(isMobile) window.location.replace("mobile/index.html");
  })();
</script>
<title>Age to Age — Phase 1 : Genèse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <header id="topbar">
    <h1>Age to Age</h1>
    <span class="era-badge">Genèse — avant l'Ère 1</span>
    <div class="res-pill" id="pillBois"><span class="ic">🪵</span><span id="resBois">0</span> <span class="delta" id="deltaBois"></span></div>
    <div class="res-pill" id="pillPierre"><span class="ic">🪨</span><span id="resPierre">0</span> <span class="delta" id="deltaPierre"></span></div>
    <div class="res-pill" id="pillNourriture"><span class="ic">🌾</span><span id="resNourriture">0</span> <span class="delta" id="deltaNourriture"></span></div>
    <div class="res-pill" id="pillOr"><span class="ic">✨</span><span id="resOr">0</span> <span class="delta" id="deltaOr"></span></div>
    <div class="res-pill"><span class="ic">👥</span><span id="popCount">0</span> <span class="detail" id="popDetail"></span></div>
    <div id="clock"><span id="seasonIcon">🌱</span><span id="clockLabel">Printemps · Jour 1 · Jour</span>
      <span id="speedControls">
        <button data-speed="1" class="active">▶</button><button data-speed="3">▶▶</button><button data-speed="0">⏸</button>
      </span>
    </div>
  </header>

  <main>
    <div id="mapWrap">
      <div id="mapCanvas">
        <div id="mapSvg"></div>
        <div id="nightVeil"></div>
        <div id="markerLayer"></div>
      </div>
    </div>

    <div id="infoPanel">
      <div id="villagePanel" class="hidden"></div>
      <div id="recruitPanel" class="hidden"></div>
      <div id="upgradesPanel" class="hidden"></div>
      <h2>Détails</h2>
      <div id="infoContent">Clique sur un site de recherche ou sur l'entrepôt pour voir ses détails.</div>
    </div>
  </main>

  <div id="buildBar" class="hidden">
    <span class="eraLabel">Bâtiments — Ère 1</span>
    <div id="menuList"></div>
  </div>

  <footer>
    <button id="btnSave">💾 Sauvegarder</button>
    <button id="btnExport">⬇️ Exporter .json</button>
    <button id="btnImport">⬆️ Importer</button>
    <input type="file" id="fileImport" accept="application/json">
    <button id="btnReset">🗑️ Nouvelle partie</button>
    <span style="margin-left:auto;color:var(--bone-dim);font-family:var(--font-mono);font-size:11px;">Phase 1 — Genèse : Recherche & Découverte</span>
  </footer>
</div>
<div id="toast"></div>

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/simulation.js"></script>
<script src="js/render-map.js"></script>
<script src="js/render-panel.js"></script>
<script src="js/render-buildbar.js"></script>
<script src="js/render-topbar.js"></script>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/main.js"></script>
</body>
</html>
