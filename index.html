<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Builder Évolutif — Prototype Ère 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <header id="topbar">
    <h1>Cité Évolutive</h1>
    <span class="era-badge" id="eraBadge">Ère 1 — L'Aube des Clans</span>
    <div class="res-pill" id="pillBois"><span class="ic">🪵</span><span id="resBois">0</span> <span id="deltaBois" class="delta"></span></div>
    <div class="res-pill" id="pillPierre"><span class="ic">🪨</span><span id="resPierre">0</span> <span id="deltaPierre" class="delta"></span></div>
    <div class="res-pill" id="foodPill"><span class="ic">🌾</span><span id="resNourriture">0</span> <span id="deltaNourriture" class="delta"></span></div>
    <div class="res-pill" id="pillPop"><span class="ic">👥</span><span id="popCount">0</span>/<span id="popCap">0</span> <span id="popFree" class="delta"></span></div>
    <div class="res-pill" id="pillOr"><span class="ic">✨</span><span id="resOr">0</span></div>
    <div id="clock"><span id="seasonIcon">🌱</span><span id="clockLabel">Printemps · Jour 1 · Jour</span>
      <span id="speedControls">
        <button data-speed="1" class="active">▶</button><button data-speed="3">▶▶</button><button data-speed="0">⏸</button>
      </span>
    </div>
  </header>

  <main>
    <div id="mapWrap">
      <div id="grid"></div>
    </div>

    <div id="infoPanel">
      <h2>Détails</h2>
      <div id="infoContent">Clique sur un bâtiment ou une case pour voir ses détails.</div>
    </div>
  </main>

  <div id="buildBar">
    <span class="eraLabel">Bâtiments — Ère 1</span>
    <div id="menuList" style="display:flex;gap:8px;"></div>
  </div>

  <footer>
    <button id="btnSave">💾 Sauvegarder</button>
    <button id="btnExport">⬇️ Exporter .json</button>
    <button id="btnImport">⬆️ Importer</button>
    <input type="file" id="fileImport" accept="application/json">
    <button id="btnReset">🗑️ Nouvelle partie</button>
    <span style="margin-left:auto;color:var(--bone-dim);font-family:var(--font-mono);font-size:11px;">Prototype Milestone 1 — un bâtiment de chaque type, évolution par niveaux</span>
  </footer>
</div>
<div id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/simulation.js"></script>
  <script src="js/buildings.js"></script>
  <script src="js/render-map.js"></script>
  <script src="js/render-panel.js"></script>
  <script src="js/render-buildbar.js"></script>
  <script src="js/render-topbar.js"></script>
  <script src="js/render-tooltips.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
